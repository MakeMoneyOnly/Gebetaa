# Lighthouse CI Workflow
# Automated performance auditing with Lighthouse
# Based on github-workflow-automation SKILL best practices

name: Lighthouse CI

on:
    pull_request:
        branches: [main, develop]
    push:
        branches: [main]

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: '22'
    PNPM_VERSION: '10'

jobs:
    lighthouse:
        name: Lighthouse Audit
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build application
              run: pnpm build
              env:
                  # Provide dummy env vars for build
                  NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: dummy-key
                  SUPABASE_SECRET_KEY: dummy-secret-key
                  QR_HMAC_SECRET: dummy-hmac-secret-for-ci-min-32-chars
                  DATABASE_URL: postgresql://dummy

            - name: Run Lighthouse CI
              uses: treosh/lighthouse-ci-action@v11
              with:
                  configPath: ./lighthouserc.json
                  budgetPath: ./lighthouse-budget.json
                  uploadArtifacts: true
                  temporaryPublicStorage: true

            - name: Upload Lighthouse results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: lighthouse-results-${{ github.run_id }}-${{ github.run_attempt }}
                  path: .lighthouseci/
                  retention-days: 7
                  include-hidden-files: true
                  if-no-files-found: warn
