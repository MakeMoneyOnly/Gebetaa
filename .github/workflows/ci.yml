name: CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

env:
    NODE_VERSION: '20'
    PNPM_VERSION: '9'

jobs:
    # ============================================
    # LINT & TYPE CHECK
    # ============================================
    lint:
        name: Lint & Type Check
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: ${{ env.PNPM_VERSION }}

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run ESLint
              run: pnpm lint

            - name: Run TypeScript type check
              run: pnpm type-check

            - name: Check formatting
              run: pnpm format:check

    # ============================================
    # UNIT TESTS
    # ============================================
    test-unit:
        name: Unit Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: ${{ env.PNPM_VERSION }}

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run unit tests with coverage
              run: pnpm test:coverage

            - name: Upload coverage report
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 7

    # ============================================
    # SECURITY SCAN
    # ============================================
    security-scan:
        name: Security Scan
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: 'fs'
                  scan-ref: '.'
                  severity: 'CRITICAL,HIGH'
                  exit-code: '1'
                  ignore-unfixed: true

            - name: Run npm audit
              run: pnpm audit --audit-level=high
              continue-on-error: true

    # ============================================
    # BUILD
    # ============================================
    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint, test-unit]
        permissions:
            contents: read
        env:
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
            NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_APP_NAME: 'Gebeta'
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: ${{ env.PNPM_VERSION }}

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Cache Next.js build
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.npm
                      ${{ github.workspace }}/.next/cache
                  key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

            - name: Build application
              run: pnpm next build --webpack
              env:
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
                  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

            - name: Verify build output
              run: |
                  echo "Checking build output..."
                  ls -la .next/ || echo "No .next directory found"
                  ls -la .next/server/ || echo "No .next/server directory found"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: build
                  path: .next/
                  include-hidden-files: true
                  retention-days: 7
                  if-no-files-found: error

    # ============================================
    # E2E TESTS
    # ============================================
    test-e2e:
        name: E2E Tests
        runs-on: ubuntu-latest
        needs: build
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: ${{ env.PNPM_VERSION }}

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: build
                  path: .next

            - name: Run E2E tests
              run: pnpm run test:e2e
              env:
                  CI: true

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

    # DEPLOY TO PRODUCTION
    # ============================================
    deploy-production:
        name: Deploy to Production
        runs-on: ubuntu-latest
        needs: [build, test-e2e]
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: write
        environment:
            name: production
            url: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        steps:
            - uses: actions/checkout@v4

            - name: Deploy to Vercel (Production)
              id: deploy-production
              uses: amondnet/vercel-action@v25
              with:
                  vercel-token: ${{ secrets.VERCEL_TOKEN }}
                  vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
                  vercel-args: '--prod'
                  scope: ${{ secrets.VERCEL_ORG_ID }}

            - name: Health Check
              id: health-check
              run: |
                  echo "Waiting for deployment to be ready..."
                  sleep 30
                  APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"
                  if [ -z "$APP_URL" ]; then
                    echo "NEXT_PUBLIC_APP_URL secret is not set"
                    exit 1
                  fi
                  APP_URL="${APP_URL%/}"
                  curl -sSf "$APP_URL/api/health" || exit 1
                  echo "Health check passed!"

            - name: Rollback on Health Check Failure
              if: failure()
              run: |
                  echo "Health check failed, initiating rollback..."
                  # Vercel automatically keeps previous deployments
                  # Use Vercel CLI to rollback to previous production deployment
                  npx vercel rollback --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} || true
                  echo "Rollback initiated. Previous deployment should be restored."

            - name: Create GitHub Release
              if: startsWith(github.event.head_commit.message, 'release:')
              uses: softprops/action-gh-release@v1
              with:
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
