name: Stage5 Daily Snapshot

on:
  schedule:
    # Daily at 05:15 UTC
    - cron: '15 5 * * *'
  workflow_dispatch:

jobs:
  capture_snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Verify Stage5 window is initialized
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing required secret: SUPABASE_DB_URL"
            exit 1
          fi
          INIT_COUNT=$(psql "$SUPABASE_DB_URL" -t -A -c "select count(*) from ops.stage5_run_events where event_type = 'stage5_window_initialized';")
          if [ "${INIT_COUNT:-0}" -lt 1 ]; then
            echo "Stage5 window is not initialized. Run Step 00 first."
            exit 1
          fi

      - name: Run Step 01 snapshot SQL
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f supabase/sql/stage5_evidence_window_01_capture_snapshot.sql

      - name: Print latest snapshot counts
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -c "select count(*) as index_snapshots from ops.stage5_index_usage_snapshots;"
          psql "$SUPABASE_DB_URL" -c "select count(*) as query_snapshots from ops.stage5_query_stat_snapshots;"
          psql "$SUPABASE_DB_URL" -c "select event_at, event_type from ops.stage5_run_events order by id desc limit 5;"
